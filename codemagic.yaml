workflows:
  ios-app-store:
    name: SVT-O-MATIC iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Alexander Carpenter

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.github.acarpe81.svtomatic
      vars:
        XCODE_WORKSPACE: "src/SVT-O-MATIC_ EP training tool.xcworkspace"
        XCODE_SCHEME: "SVT-O-MATIC_ EP training tool"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd src
          pod install --repo-update

      - name: Build and export IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

      - name: Submit to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_KEY_B64" | base64 --decode > /tmp/auth_key.p8
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          app-store-connect publish \
            --path "$IPA_PATH" \
            --testflight \
            --private-key @file:/tmp/auth_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
