workflows:
  ios-app-store:
    name: SVT-O-MATIC iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Alexander Carpenter

    environment:
      vars:
        XCODE_WORKSPACE: "src/SVT-O-MATIC_ EP training tool.xcworkspace"
        XCODE_SCHEME: "SVT-O-MATIC_ EP training tool"
        BUNDLE_ID: "io.github.acarpe81.svtomatic"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch signing files (create if missing)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Install CocoaPods dependencies
        script: |
          cd src
          pod install --repo-update

      - name: Build and export IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        submit_to_testflight: true
